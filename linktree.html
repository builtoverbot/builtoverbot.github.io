    <script>
        // Initial theme check based on system preference
        const darkModeMediaQuery = window.matchMedia('(prefers-color-scheme: dark)');

        function updateTheme(e) {
            if (e.matches) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        }

        // Initialize theme
        updateTheme(darkModeMediaQuery);

        // Listen for system theme changes
        darkModeMediaQuery.addEventListener('change', updateTheme);
    </script>

    <style>
        :root {
            --bg-color: #f5f5f4;
            --text-color: #1c1917;
            --accent-glow: rgba(217, 119, 6, 0.05);

            --rivet-border: #78716c;

        }

        .dark {
            --bg-color: #2c2824;
            --text-color: #d6d3d1;
            --accent-glow: rgba(217, 119, 6, 0.1);
            --rivet-color: #78716c;
            --rivet-border: #292524;
            --scanline-color: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
        }

        /* --- VINTAGE & TERMINAL EFFECTS --- */
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
        }
        .vintage-bg {
            background-image:
                radial-gradient(circle at 50% 0%, var(--accent-glow) 0%, var(--bg-color) 100%),
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.06'/%3E%3C/svg%3E");
            background-attachment: fixed;
        }
        .scanlines::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: var(--scanline-color);
            z-index: 10;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            border-radius: inherit;
        }
        .crt-flicker {
            animation: flicker 0.15s infinite;
        }
        @keyframes flicker {
            0% { opacity: 0.95; }
            50% { opacity: 1; }
            100% { opacity: 0.95; }
        }
        .gear-spin-slow {
            animation: spin 25s linear infinite;
        }
        .gear-spin-reverse {
            animation: spin-reverse 30s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes spin-reverse {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }

        /* Typewriter Effect */
        .typewriter {
            overflow: hidden;
            border-right: .15em solid #4ade80;
            white-space: nowrap;
            margin: 0 auto;
            letter-spacing: .15em;
            animation:
                typing 3.5s steps(40, end),
                blink-caret .75s step-end infinite;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: #4ade80; }
        }

        /* Utility classes for repetitive elements */
        .rivet {
            position: absolute;
            width: 0.75rem;
            height: 0.75rem;
            border-radius: 9999px;
            background-color: var(--rivet-color);
            border: 1px solid var(--rivet-border);
            box-shadow: inset 0 -1px 2px rgba(0,0,0,0.4), 0 1px 1px rgba(255,255,255,0.2);
        }
        .dark .rivet {
            box-shadow: inset 0 -1px 2px rgba(0,0,0,0.8), 0 1px 1px rgba(255,255,255,0.2);
        }
    </style>
